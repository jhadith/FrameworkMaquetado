<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Pago y Envío</title>

  <!-- Carga la hoja de estilos de Bootstrap 5 desde un CDN (Content Delivery Network). -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icono favicon de la pestaña del navegador. -->
  <link rel="icon" href="Imagenes/Logo.png">

  <!-- Script de Lucide Icons para renderizar la iconografia vectorial. -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Parte 1: Sincronización Inmediata del Tema Claro / Oscuro -->

  <!-- Expresion de funcion ejecutada inmediatamente (IIFE) para aplicar el tema guardado en localStorage.
       Se ejecuta antes de que se dibuje el cuerpo de la pagina (body), evitando el molesto parpadeo blanco
       si el usuario tiene activado el tema oscuro en su sesion. -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme) {
        if (theme === 'auto') {
          const sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', sysTheme);
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme);
        }
      }
    })();
  </script>
</head>

<body class="bg-body-tertiary">

  <!-- Parte 2: Contenedor y Estructura Principal del Formulario de Compra -->

  <div class="py-5 container">
    <div class="mb-5 text-center">
      <h2>Finalizar Compra</h2>
      <p class="lead">Por favor, completa todos los datos solicitados para procesar el pedido.</p>
    </div>

    <!-- row: Define una fila de grilla en Bootstrap.
         g-5: Establece una separacion (gutters) uniforme de nivel 5 entre columnas. -->
    <div class="row g-5">

      <!-- Columna Derecha (Resumen del carrito):
           col-md-5: Ocupa 5 de las 12 columnas en pantallas medianas (tablets).
           col-lg-4: Ocupa 4 de las 12 columnas en pantallas grandes (escritorios).
           order-md-last: Fuerza a que este bloque se renderice al final (a la derecha) en escritorio,
           pero se muestra al principio en dispositivos moviles para priorizar la visualizacion del costo total. -->
      <div class="order-md-last col-md-5 col-lg-4">
        <h4 class="d-flex align-items-center justify-content-between mb-3">
          <span class="text-primary">Tu Carrito</span>
          <!-- Badge numerica responsiva de Bootstrap. El ID badge-cantidad-factura es modificado por facturacion.js -->
          <span class="bg-primary rounded-pill badge" id="badge-cantidad-factura">0</span>
        </h4>
        <!-- Lista de grupo (list-group).
             El ID lista-carrito-factura es donde facturacion.js inyecta dinamicamente los items guardados. -->
        <ul class="list-group mb-3" id="lista-carrito-factura">
          <!-- El contenido del carrito se inyecta desde facturacion.js -->
        </ul>
      </div>

      <!-- Columna Izquierda (Datos de envio y pago):
           col-md-7: Ocupa 7 de las 12 columnas en pantallas medianas.
           col-lg-8: Ocupa 8 de las 12 columnas en pantallas grandes. -->
      <div class="col-md-7 col-lg-8">
        <h4 class="mb-3">Datos del Cliente y Envío</h4>

        <!-- Formulario sin accion (action) declarada porque el envio es controlado asincronamente por facturacion.js -->
        <form>
          <div class="row g-3">

            <!-- Campo Nombres:
                 form-label: Estiliza la etiqueta del formulario en Bootstrap.
                 form-control: Da un diseño estetico responsivo al input.
                 required: Atributo HTML nativo que valida que el campo no este vacio al hacer submit. -->
            <div class="col-sm-6">
              <label for="nombres" class="form-label">Nombres</label>
              <input type="text" class="form-control" id="nombres" placeholder="Ej. Juan Andrés" required>
            </div>
            <div class="col-sm-6">
              <label for="apellidos" class="form-label">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" placeholder="Ej. Pérez Gómez" required>
            </div>

            <!-- Campo Correo:
                 type="email": Valida de forma nativa que el texto ingresado tenga un formato de correo electronico valido (ej: usuario@dominio.com). -->
            <div class="col-md-6">
              <label for="email" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" placeholder="usuario@ejemplo.com" required>
            </div>
            <!-- Campo Telefono:
                 type="tel": Valida el ingreso de caracteres numericos para telefonos. -->
            <div class="col-md-6">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="telefono" placeholder="099 999 9999" required>
            </div>

            <div class="col-12">
              <label for="direccion" class="form-label">Dirección Completa</label>
              <input type="text" class="form-control" id="direccion"
                placeholder="Calle Principal 123 y Calle Secundaria" required>
            </div>

            <!-- Menu de seleccion de pais (select con clase form-select). -->
            <div class="col-md-5">
              <label for="pais" class="form-label">País</label>
              <select class="form-select" id="pais" required>
                <option value="">Seleccionar...</option>
                <option>Ecuador</option>
                <option>Otro...</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="ciudad" class="form-label">Ciudad</label>
              <input type="text" class="form-control" id="ciudad" placeholder="Ej. Quito" required>
            </div>
            <div class="col-md-3">
              <label for="codigo_postal" class="form-label">Código Postal</label>
              <input type="text" class="form-control" id="codigo_postal" placeholder="170101">
            </div>
          </div>

          <!-- hr class="my-4" dibuja una linea divisoria estetica con margenes verticales simetricos de nivel 4. -->
          <hr class="my-4">

          <h4 class="mb-3">Información de Pago</h4>
          <div class="row gy-3">
            <div class="col-md-6">
              <label for="nombre_tarjeta" class="form-label">Nombre en la tarjeta</label>
              <input type="text" class="form-control" id="nombre_tarjeta" required>
              <small class="text-muted">Tal como aparece impreso en la tarjeta</small>
            </div>
            <div class="col-md-6">
              <label for="numero_tarjeta" class="form-label">Número de tarjeta</label>
              <input type="text" class="form-control" id="numero_tarjeta" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="col-md-3">
              <label for="vencimiento" class="form-label">Vencimiento</label>
              <input type="text" class="form-control" id="vencimiento" placeholder="MM/AA" required>
            </div>
            <div class="col-md-3">
              <label for="cvv" class="form-label">CVV</label>
              <input type="text" class="form-control" id="cvv" placeholder="123" required>
            </div>
          </div>

          <hr class="my-4">

          <!-- Boton que desencadena el evento 'submit' en el formulario.
               btn-lg y w-100: Estilos de Bootstrap para hacerlo grande y que ocupe todo el ancho disponible. -->
          <button class="w-100 btn btn-primary btn-lg" type="submit">Procesar y Recibir Producto</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Parte 3: Modal de Visualizacion de Recibo de Factura -->

  <!-- facturaModal: Se activa de manera automatica en facturacion.js mediante bootstrap.Modal.show().
       data-bs-backdrop="static": Bloquea el cierre accidental del modal si el usuario hace clic fuera de el.
       data-bs-keyboard="false": Bloquea el cierre del modal al pulsar la tecla Escape. Esto obliga al usuario a usar el boton Cerrar.
       modal-dialog-scrollable: Permite desplazar verticalmente solo el cuerpo del modal si la factura es muy larga. -->
  <div class="modal fade" id="facturaModal" tabindex="-1" aria-labelledby="facturaModalLabel" aria-hidden="true"
    data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="pb-0 border-bottom-0 modal-header">
          <h1 class="text-success modal-title fs-4 fw-bold" id="facturaModalLabel">
            <!-- Icono vectorial check-circle inyectado por Lucide. Si se elimina, no se visualizara el icono del exito. -->
            <i data-lucide="check-circle" style="width: 28px; height: 28px; margin-right: 8px;"></i>
            ¡Pago Exitoso!
          </h1>
        </div>

        <!-- En este contenedor se inyecta dinamicamente todo el diseño estructurado de la factura en facturacion.js. -->
        <div class="modal-body" id="factura-modal-body">
          <!-- Contenido de la factura inyectado por JS -->
        </div>

        <div class="pt-0 border-top-0 modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <!-- Al hacer clic en 'Volver a la Tienda', se limpia la clave 'carrito' de localStorage para reiniciar la compra. -->
          <a href="index.html" class="btn btn-primary" onclick="localStorage.removeItem('carrito')">Volver a la
            Tienda</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Carga la biblioteca JavaScript de Bootstrap para habilitar el control de modales y componentes interactivos. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Enlace al JS de facturacion, que maneja el calculo de totales, validacion de tarjeta y construccion del recibo. -->
  <script src="./src/js/facturacion.js"></script>
</body>

</html>
