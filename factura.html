<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Pago y Envío</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Sincronización de tema (Claro/Oscuro) con Página 1 -->
  <script>
    (function () {
      const theme = localStorage.getItem('theme');
      if (theme) {
        if (theme === 'auto') {
          const sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-bs-theme', sysTheme);
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme);
        }
      }
    })();
  </script>
</head>

<body class="bg-body-tertiary">

  <div class="container py-5">
    <div class="text-center mb-5">
      <h2>Finalizar Compra</h2>
      <p class="lead">Por favor, completa todos los datos solicitados para procesar el pedido.</p>
    </div>

    <div class="row g-5">

      <div class="col-md-5 col-lg-4 order-md-last">
        <h4 class="d-flex justify-content-between align-items-center mb-3">
          <span class="text-primary">Producto a recibir</span>
          <span class="badge bg-primary rounded-pill">1</span>
        </h4>
        <ul class="list-group mb-3">
          <li class="list-group-item d-flex justify-content-between lh-sm">
            <div>
              <h6 class="my-0">Nombre del Producto</h6>
              <small class="text-muted">Descripción técnica o variante</small>
            </div>
            <span class="text-muted">$0.00</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <span>Total (USD)</span>
            <strong>$0.00</strong>
          </li>
        </ul>
      </div>

      <div class="col-md-7 col-lg-8">
        <h4 class="mb-3">Datos del Cliente y Envío</h4>
        <form>
          <div class="row g-3">

            <div class="col-sm-6">
              <label for="nombres" class="form-label">Nombres</label>
              <input type="text" class="form-control" id="nombres" placeholder="Ej. Juan Andrés" required>
            </div>
            <div class="col-sm-6">
              <label for="apellidos" class="form-label">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" placeholder="Ej. Pérez Gómez" required>
            </div>

            <div class="col-md-6">
              <label for="email" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" placeholder="usuario@ejemplo.com" required>
            </div>
            <div class="col-md-6">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="telefono" placeholder="099 999 9999" required>
            </div>

            <div class="col-12">
              <label for="direccion" class="form-label">Dirección Completa</label>
              <input type="text" class="form-control" id="direccion"
                placeholder="Calle Principal 123 y Calle Secundaria" required>
            </div>

            <div class="col-md-5">
              <label for="pais" class="form-label">País</label>
              <select class="form-select" id="pais" required>
                <option value="">Seleccionar...</option>
                <option>Ecuador</option>
                <option>Otro...</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="ciudad" class="form-label">Ciudad</label>
              <input type="text" class="form-control" id="ciudad" placeholder="Ej. Quito" required>
            </div>
            <div class="col-md-3">
              <label for="codigo_postal" class="form-label">Código Postal</label>
              <input type="text" class="form-control" id="codigo_postal" placeholder="170101">
            </div>
          </div>

          <hr class="my-4">

          <h4 class="mb-3">Información de Pago</h4>
          <div class="row gy-3">
            <div class="col-md-6">
              <label for="nombre_tarjeta" class="form-label">Nombre en la tarjeta</label>
              <input type="text" class="form-control" id="nombre_tarjeta" required>
              <small class="text-muted">Tal como aparece impreso en la tarjeta</small>
            </div>
            <div class="col-md-6">
              <label for="numero_tarjeta" class="form-label">Número de tarjeta</label>
              <input type="text" class="form-control" id="numero_tarjeta" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="col-md-3">
              <label for="vencimiento" class="form-label">Vencimiento</label>
              <input type="text" class="form-control" id="vencimiento" placeholder="MM/AA" required>
            </div>
            <div class="col-md-3">
              <label for="cvv" class="form-label">CVV</label>
              <input type="text" class="form-control" id="cvv" placeholder="123" required>
            </div>
          </div>

          <hr class="my-4">

          <button class="w-100 btn btn-primary btn-lg" type="submit">Procesar y Recibir Producto</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./src/js/facturacion.js"></script>
</body>

</html>
